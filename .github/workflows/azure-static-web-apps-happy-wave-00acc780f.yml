name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      # 1 - Checkout du code
      - uses: actions/checkout@v3

      # 2 - Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3 - Installer les dépendances
      - name: Install dependencies
        run: npm install

      # 4 -  Build et export statique Next.js
      - name: Build and export
        run: |
          npm run build
          npm run export   # génère le dossier 'out'

      # 5 Déployer sur Azure Static Web App
      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_WAVE_00ACC780F }}
          action: "upload"
          app_location: "/"      # racine du projet
          api_location: ""       # vide car pas d’API
          output_location: "out" # dossier généré par next export
